<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <title>Idea vs Idea — AI Business Idea Comparison Tool | Launchpad</title>
  <meta name="description" content="Can't decide between two business ideas? Let AI compare them side by side across market opportunity, execution difficulty, defensibility, and revenue potential.">
  <link rel="canonical" href="https://nova-ops.space/tools/idea-vs-idea.html">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,600,700,800,900&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css"><link rel="stylesheet" href="/brand.css">
</head>
<body>
  <div class="tool-page">
    <header class="tool-header">
      <div class="container-sm">
        <a href="/launchpad.html" style="font-size:.85rem;color:var(--txt-3);display:inline-flex;align-items:center;gap:.4rem;margin-bottom:1rem">← Back to Launchpad</a>
        <p class="eyebrow eyebrow-lp">IDEA VS IDEA ⚖️</p>
        <h1 style="font-size:clamp(1.8rem,4vw,2.8rem)">Compare Two Ideas and <span class="gradient-text">Pick the Winner</span></h1>
        <p style="color:var(--txt-2);margin-top:.5rem;font-size:.975rem;max-width:540px;margin-left:auto;margin-right:auto;">Stuck between two business ideas? Get an objective AI comparison so you can commit to the right one.</p>
      </div>
    </header>
    <main class="tool-body">
      <form id="tool-form" class="tool-form">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          <div class="form-group"><label for="idea1">💡 Idea A</label><textarea id="idea1" class="form-control" rows="4" placeholder="Describe your first business idea..." required></textarea></div>
          <div class="form-group"><label for="idea2">💡 Idea B</label><textarea id="idea2" class="form-control" rows="4" placeholder="Describe your second business idea..." required></textarea></div>
        </div>
        <div class="form-group"><label for="context">Your Background / Skills</label><input type="text" id="context" class="form-control" placeholder="e.g. 5 years in SaaS sales, design background, no-code developer..."></div>
        <div class="form-group"><label for="priority">What Matters Most to You?</label>
          <select id="priority" class="form-control">
            <option>Speed to revenue</option>
            <option>Long-term market size</option>
            <option>Lifestyle / flexibility</option>
            <option>Venture scale potential</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-lg tool-submit" id="submit-btn">Compare My Ideas →</button>
      </form>
      <div id="result" style="display:none"></div>
    </main>
  </div>
  <script src="/script.js"></script><script src="/site.js"></script>
  <script>
  (function(){
    const API='https://launchpad-api.dpatel0729.workers.dev';
    const SYSTEM=`You are a startup advisor helping a founder decide between two business ideas. Compare them objectively and give a clear recommendation.

Structure:
## SIDE-BY-SIDE COMPARISON — Table comparing both ideas across: Market Size, Revenue Potential, Execution Difficulty, Defensibility, Time to First Dollar, Founder Fit
## IDEA A STRENGTHS & WEAKNESSES
## IDEA B STRENGTHS & WEAKNESSES
## THE VERDICT — Clear winner with specific reasoning (no fence-sitting)
## WHAT WOULD MAKE YOU WRONG — Under what conditions would the losing idea actually win?

Be decisive. Give a clear winner. If it's truly a tie, explain the exact condition that would tip the scales. Use ## headers.`;
    document.getElementById('tool-form').addEventListener('submit',async(e)=>{
      e.preventDefault();
      const btn=document.getElementById('submit-btn'),result=document.getElementById('result');
      btn.classList.add('btn-loading');btn.disabled=true;
      result.style.display='block';result.innerHTML='<div style="display:flex;justify-content:center;padding:3rem"><div class="spinner"></div></div>';
      const msg=`Idea A: ${document.getElementById('idea1').value}\n\nIdea B: ${document.getElementById('idea2').value}\n\nFounder background: ${document.getElementById('context').value||'Not specified'}\nPriority: ${document.getElementById('priority').value}`;
      try{
        const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:SYSTEM,messages:[{role:'user',content:msg}]})});
        if(!res.ok)throw new Error();
        const data=await res.json();const text=data?.content?.[0]?.text||'';
        const sections=text.split(/\n(?=##)/);
        let html='<div class="out-card"><p class="eyebrow eyebrow-lp" style="margin-bottom:1rem">IDEA COMPARISON</p>';
        sections.forEach(s=>{const ls=s.trim().split('\n');const hd=ls[0].replace(/^#+\s*/,'');const b=ls.slice(1).join('\n').trim().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^[-*] (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>\n?)+/g,'<ul>$&</ul>');
        if(hd||b)html+=`<section>${hd?`<h4>${hd}</h4>`:''}${b?`<p>${b}</p>`:''}</section>`;});
        result.innerHTML=html+'</div>';
      }catch{result.innerHTML='<div class="out-card"><div class="alert alert-red">Something went wrong. Please try again.</div></div>';}
      finally{btn.classList.remove('btn-loading');btn.disabled=false;}
    });
  })();
  </script>
</body>
</html>
