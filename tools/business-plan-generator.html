<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <title>AI Business Plan Generator — Full Business Plan in Minutes | Launchpad</title>
  <meta name="description" content="Generate a complete, structured business plan with AI in minutes. Get executive summary, market analysis, financials overview, and operational plan — all formatted and ready.">
  <link rel="canonical" href="https://nova-ops.space/tools/business-plan-generator.html">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/brand.css">
</head>
<body>
  <div class="tool-page">
    <header class="tool-header">
      <div class="container-sm">
        <a href="/launchpad.html" style="font-size:.85rem;color:var(--txt-3);display:inline-flex;align-items:center;gap:.4rem;margin-bottom:1rem">← Back to Launchpad</a>
        <p class="eyebrow eyebrow-lp">BUSINESS PLAN GENERATOR</p>
        <h1 style="font-size:clamp(1.8rem,4vw,2.8rem)">Generate a <span class="gradient-text">Business Plan</span> in Minutes</h1>
        <p style="color:var(--txt-2);margin-top:.5rem;font-size:.975rem;max-width:540px;margin-left:auto;margin-right:auto;">Get a complete, structured business plan — executive summary, market analysis, financial projections overview, and operations plan.</p>
      </div>
    </header>
    <main class="tool-body">
      <form id="tool-form" class="tool-form">
        <div class="form-group"><label for="business">Business Name &amp; Description</label><textarea id="business" class="form-control" rows="3" placeholder="What is your business? What does it do? What problem does it solve?" required></textarea></div>
        <div class="form-group"><label for="model">Business Model</label><input type="text" id="model" class="form-control" placeholder="e.g. SaaS subscription, e-commerce, service retainer, marketplace..." required></div>
        <div class="form-group"><label for="target">Target Customer</label><input type="text" id="target" class="form-control" placeholder="Who is your ideal customer? Be specific." required></div>
        <div class="form-group"><label for="revenue">Revenue Goal (Year 1)</label><input type="text" id="revenue" class="form-control" placeholder="e.g. $100k, $500k, $1M"></div>
        <div class="form-group"><label for="team">Team / Founders</label><input type="text" id="team" class="form-control" placeholder="Who is building this? Key roles and experience."></div>
        <button type="submit" class="btn btn-primary btn-lg tool-submit" id="submit-btn">Generate Business Plan →</button>
      </form>
      <div id="result" style="display:none"></div>
    </main>
  </div>
<script src="/site.js"></script>
  <script>
  (function(){
    const API='https://launchpad-api.dpatel0729.workers.dev';
    const SYSTEM=`You are a business consultant and startup advisor. Generate a comprehensive business plan with these sections:
## EXECUTIVE SUMMARY — 2-3 paragraph overview of the business, opportunity, and goals
## COMPANY OVERVIEW — Mission, vision, and what the company does
## MARKET ANALYSIS — Industry overview, target market size, trends, and competitive landscape
## PRODUCTS & SERVICES — What you offer, key features, and unique value proposition
## GO-TO-MARKET STRATEGY — How you'll acquire customers and grow
## FINANCIAL OVERVIEW — Revenue model, pricing, Year 1 projections (qualitative), path to profitability
## OPERATIONS PLAN — Key processes, team structure, and operational milestones
## MILESTONES — 12-month roadmap with key objectives

Write professionally. Be specific and realistic. Use ## headers.`;
    document.getElementById('tool-form').addEventListener('submit',async(e)=>{
      e.preventDefault();
      const btn=document.getElementById('submit-btn'),result=document.getElementById('result');
      btn.classList.add('btn-loading');btn.disabled=true;
      result.style.display='block';result.innerHTML='<div style="display:flex;justify-content:center;padding:3rem"><div class="spinner"></div></div>';
      const msg=`Business: ${document.getElementById('business').value}\nBusiness model: ${document.getElementById('model').value}\nTarget customer: ${document.getElementById('target').value}\nYear 1 revenue goal: ${document.getElementById('revenue').value||'TBD'}\nTeam: ${document.getElementById('team').value||'Solo founder'}`;
      try{
        const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:SYSTEM,messages:[{role:'user',content:msg}]})});
        if(!res.ok)throw new Error();
        const data=await res.json();const text=data?.content?.[0]?.text||'';
        const sections=text.split(/\n(?=##)/);
        let html='<div class="out-card"><p class="eyebrow eyebrow-lp" style="margin-bottom:1rem">BUSINESS PLAN</p>';
        sections.forEach(s=>{const ls=s.trim().split('\n');const hd=ls[0].replace(/^#+\s*/,'');const b=ls.slice(1).join('\n').trim().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^[-*] (.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>\n?)+/g,'<ul>$&</ul>');
        if(hd||b)html+=`<section>${hd?`<h4>${hd}</h4>`:''}${b?`<p>${b}</p>`:''}</section>`;});
        result.innerHTML=html+'</div>';
      }catch{result.innerHTML='<div class="out-card"><div class="alert alert-red">Something went wrong. Please try again.</div></div>';}
      finally{btn.classList.remove('btn-loading');btn.disabled=false;}
    });
  })();
  </script>
</body>
</html>
