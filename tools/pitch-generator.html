<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <title>AI Pitch Generator — Create an Investor Pitch in Seconds | Launchpad</title>
  <meta name="description" content="Generate a compelling investor pitch deck narrative for your startup using AI. Get problem, solution, market size, traction, and ask — all structured and ready to present.">
  <link rel="canonical" href="https://nova-ops.space/tools/pitch-generator.html">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,600,700,800,900&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/brand.css">
</head>
<body>
  <div class="tool-page">
    <header class="tool-header">
      <div class="container-sm">
        <a href="/launchpad.html" style="font-size:.85rem;color:var(--txt-3);display:inline-flex;align-items:center;gap:.4rem;margin-bottom:1rem">← Back to Launchpad</a>
        <p class="eyebrow eyebrow-lp">PITCH GENERATOR</p>
        <h1 style="font-size:clamp(1.8rem,4vw,2.8rem)">Generate an <span class="gradient-text">Investor Pitch</span> in Seconds</h1>
        <p style="color:var(--txt-2);margin-top:.5rem;font-size:.975rem;max-width:540px;margin-left:auto;margin-right:auto;">Get a complete pitch narrative — problem, solution, market, traction, and ask — structured for investors.</p>
      </div>
    </header>
    <main class="tool-body">
      <form id="tool-form" class="tool-form">
        <div class="form-group">
          <label for="startup">Startup / Product Name</label>
          <input type="text" id="startup" class="form-control" placeholder="e.g. Acme AI" required>
        </div>
        <div class="form-group">
          <label for="problem">Problem You're Solving</label>
          <textarea id="problem" class="form-control" rows="3" placeholder="What specific problem does your startup solve? Who suffers from this problem?" required></textarea>
        </div>
        <div class="form-group">
          <label for="solution">Your Solution</label>
          <textarea id="solution" class="form-control" rows="3" placeholder="How does your product solve the problem? What makes it unique?" required></textarea>
        </div>
        <div class="form-group">
          <label for="traction">Traction / Progress</label>
          <input type="text" id="traction" class="form-control" placeholder="e.g. 50 beta users, $5k MRR, 3 LOIs signed...">
        </div>
        <div class="form-group">
          <label for="ask">Funding Ask</label>
          <input type="text" id="ask" class="form-control" placeholder="e.g. $500k pre-seed for 12 months runway">
        </div>
        <button type="submit" class="btn btn-primary btn-lg tool-submit" id="submit-btn">Generate My Pitch →</button>
      </form>
      <div id="result" style="display:none"></div>
      <div style="margin-top:3rem;padding-top:2rem;border-top:1px solid var(--bdr)">
        <p style="font-size:.875rem;color:var(--txt-3);margin-bottom:1rem">RELATED TOOLS</p>
        <div style="display:flex;flex-wrap:wrap;gap:.75rem">
          <a href="/tools/investor-email-writer.html" class="btn btn-ghost btn-sm">✉️ Write Investor Emails</a>
          <a href="/tools/funding-readiness-score.html" class="btn btn-ghost btn-sm">💰 Check Funding Readiness</a>
        </div>
      </div>
    </main>
  </div>
  <script src="/script.js"></script>
  <script src="/site.js"></script>
  <script>
  (function() {
    const API = 'https://launchpad-api.dpatel0729.workers.dev';
    const SYSTEM = `You are a top-tier startup pitch coach. Generate a full investor pitch narrative with these sections:
## ONE-LINER — A single crisp sentence that captures the essence of the startup
## THE PROBLEM — The pain, who has it, and why it matters now
## OUR SOLUTION — What you built, how it works, and the key differentiator
## MARKET OPPORTUNITY — TAM/SAM/SOM, growth rate, and why now
## TRACTION — Current progress and validation signals
## BUSINESS MODEL — How you make money
## THE ASK — Amount, use of funds, and what you'll achieve with it
## CLOSING HOOK — One memorable line to end the pitch

Be specific, compelling, and avoid generic startup jargon. Format with ## headers.`;

    document.getElementById('tool-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const result = document.getElementById('result');
      btn.classList.add('btn-loading'); btn.disabled = true;
      result.style.display = 'block';
      result.innerHTML = '<div style="display:flex;justify-content:center;padding:3rem"><div class="spinner"></div></div>';
      const msg = `Startup: ${document.getElementById('startup').value}
Problem: ${document.getElementById('problem').value}
Solution: ${document.getElementById('solution').value}
Traction: ${document.getElementById('traction').value || 'Early stage'}
Ask: ${document.getElementById('ask').value || 'TBD'}`;
      try {
        const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1500, system:SYSTEM, messages:[{role:'user',content:msg}] }) });
        if (!res.ok) throw new Error('err');
        const data = await res.json();
        const text = data?.content?.[0]?.text || '';
        result.innerHTML = renderSections(text, 'INVESTOR PITCH');
      } catch { result.innerHTML = '<div class="out-card"><div class="alert alert-red">Something went wrong. Please try again.</div></div>'; }
      finally { btn.classList.remove('btn-loading'); btn.disabled = false; }
    });

    function renderSections(text, label) {
      const sections = text.split(/\n(?=##)/);
      let html = `<div class="out-card"><p class="eyebrow eyebrow-lp" style="margin-bottom:1rem">${label}</p>`;
      sections.forEach(s => {
        const lines = s.trim().split('\n');
        const h = lines[0].replace(/^#+\s*/,'');
        const b = lines.slice(1).join('\n').trim()
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
          .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
          .replace(/(<li>[\s\S]*?<\/li>\n?)+/g,'<ul>$&</ul>');
        if(h||b) html += `<section>${h?`<h4>${h}</h4>`:''}${b?`<p>${b}</p>`:''}</section>`;
      });
      return html + '</div>';
    }
  })();
  </script>
</body>
</html>
